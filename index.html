<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HireBoard — 医療機関向け採用管理ボード | BRIDGE</title>
<meta name="description" content="医療機関の採用をカンバンで。9紹介会社・職種別フィー自動計算。BRIDGEのプロダクト04。">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,600;0,9..144,700;0,9..144,900;1,9..144,700;1,9..144,900&family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+JP:wght@400;500;700;900&family=Noto+Serif+JP:wght@400;700;900&display=swap" rel="stylesheet">

<style>
/* ===== BRIDGE Design System v1.0 — Quiet Atelier / 職人の手記 ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--kami:#FAFAF7; --kami-2:#F4F1E8; --kami-3:#EDE8DD;
--sumi:#0A0A0F; --sumi-2:#2A2A35; --sumi-3:#6E6E78; --sumi-4:#B8B5A8;
--shu:#C8553D; --shu-deep:#A8442F; --shu-pale:#F4D5CB;
--ai:#1B4965; --ai-deep:#0F2D44; --ai-pale:#C5D4E0;
--moegi:#8A9A5B; --moegi-deep:#6B7A4F; --moegi-pale:#C8D4B0;
--taisha:#8B5A2B; --taisha-deep:#6B4420; --taisha-pale:#D4B896;
/* 旧名互換 */
--bg:var(--kami); --card:#ffffff; --border:rgba(10,10,15,0.08);
--text:var(--sumi); --dim:var(--sumi-3);
--primary:var(--shu); --primary-light:var(--shu-pale);
/* 職種色 — 4職種に4顔料 */
--pt:var(--shu); --nurse:var(--ai); --rt:var(--moegi); --office:var(--taisha);
/* ステージ色 — ファネル6段階 */
--stage-screen:var(--sumi-3); --stage-1st:var(--ai); --stage-2nd:var(--taisha);
--stage-offer:var(--moegi); --stage-hired:var(--moegi-deep); --stage-reject:var(--shu);
--sidebar-w:260px;
--serif-jp:'Noto Serif JP',serif;
--sans-jp:'Noto Sans JP',sans-serif;
--serif-en:'Fraunces','Noto Serif JP',serif;
--sans-en:'Inter','Noto Sans JP',sans-serif;
--mono:'JetBrains Mono',monospace;
}
html{font-size:14px}
body{font-family:var(--sans-jp);background:var(--kami);color:var(--sumi);display:flex;min-height:100vh;overflow-x:hidden;font-feature-settings:"palt" 1;line-height:1.7;-webkit-font-smoothing:antialiased}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:200;opacity:0.025;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='400' height='400'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");mix-blend-mode:multiply}
::selection{background:var(--shu);color:#fff}

/* Sidebar — 編集本の目次 */
.sidebar{width:var(--sidebar-w);background:var(--kami);border-right:1px solid var(--border);color:var(--sumi);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100;transition:transform .2s}
.sidebar-brand{padding:28px 24px 24px;border-bottom:2px solid var(--sumi)}
.sidebar-brand .eyebrow{font:800 9px/1 var(--sans-en);letter-spacing:0.3em;text-transform:uppercase;color:var(--shu);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.sidebar-brand .eyebrow::before{content:'';width:18px;height:1px;background:var(--shu)}
.sidebar-brand h1{font:900 28px/1 var(--serif-jp);color:var(--sumi);letter-spacing:-0.02em;margin-bottom:4px}
.sidebar-brand .jp{display:block;font:500 11px/1.4 var(--sans-jp);color:var(--sumi-3);margin-top:6px}
.sidebar-brand .en-name{display:block;font:700 italic 12px/1 var(--serif-en);color:var(--sumi-3);letter-spacing:0.04em;margin-top:6px}
.sidebar nav{flex:1;padding:20px 0}
.sidebar nav .nav-section{padding:16px 24px 8px;font:700 9px/1 var(--sans-en);text-transform:uppercase;letter-spacing:0.28em;color:var(--sumi-3)}
.sidebar nav a{display:flex;align-items:center;gap:12px;padding:10px 24px;color:var(--sumi-2);text-decoration:none;font:500 13px/1 var(--sans-jp);transition:all .15s;border-left:2px solid transparent;cursor:pointer}
.sidebar nav a:hover{background:var(--kami-2);color:var(--sumi)}
.sidebar nav a.active{color:var(--shu-deep);background:var(--shu-pale);border-left-color:var(--shu);font-weight:700}
.sidebar nav a .icon{width:18px;height:18px;display:flex;align-items:center;justify-content:center;color:currentColor}
.sidebar nav a .icon svg{width:100%;height:100%}
.sidebar-footer{padding:16px 24px;border-top:1px solid var(--border);font:500 10px/1.6 var(--mono);color:var(--sumi-4);letter-spacing:0.04em}
.sidebar-footer a{color:var(--sumi-3);text-decoration:none}
.sidebar-footer a:hover{color:var(--shu)}

/* Main */
.main{margin-left:var(--sidebar-w);flex:1;min-height:100vh;display:flex;flex-direction:column}
.topbar{background:var(--kami);border-bottom:1px solid var(--border);padding:14px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.topbar h2{font:900 24px/1.2 var(--serif-jp);color:var(--sumi);letter-spacing:-0.02em;display:flex;align-items:baseline;gap:14px}
.topbar h2::before{content:attr(data-ch);font:900 italic 18px/1 var(--serif-en);color:var(--shu);letter-spacing:0.02em}
.topbar-actions{display:flex;gap:8px;align-items:center}
.content{flex:1;padding:32px 40px;overflow-y:auto}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:2px;border:1.5px solid var(--sumi);background:transparent;color:var(--sumi);font:700 12px/1 var(--sans-jp);cursor:pointer;transition:all .15s;font-family:inherit;letter-spacing:0.02em}
.btn:hover{background:var(--sumi);color:var(--kami)}
.btn-primary{background:var(--sumi);color:var(--kami)}
.btn-primary:hover{background:transparent;color:var(--sumi)}
.btn-sm{padding:6px 12px;font-size:11px;border-width:1px}
.btn-danger{background:var(--shu);color:#fff;border-color:var(--shu)}
.btn-danger:hover{background:transparent;color:var(--shu)}

/* Badges — 矩形・縁取り */
.badge{display:inline-block;padding:3px 9px;border-radius:2px;font:700 10px/1.3 var(--sans-en);letter-spacing:0.14em;text-transform:uppercase;border:1px solid currentColor}
.badge-pt{background:var(--shu-pale);color:var(--shu-deep);border-color:var(--shu)}
.badge-nurse{background:var(--ai-pale);color:var(--ai-deep);border-color:var(--ai)}
.badge-rt{background:var(--moegi-pale);color:var(--moegi-deep);border-color:var(--moegi)}
.badge-office{background:var(--taisha-pale);color:var(--taisha-deep);border-color:var(--taisha)}
.badge-stage{padding:3px 9px;border-radius:2px;font:700 10px/1.3 var(--sans-en);letter-spacing:0.14em;text-transform:uppercase;color:#fff;border:1px solid currentColor}
.badge-employ{display:inline-block;padding:2px 7px;border-radius:2px;font:700 10px/1.2 var(--sans-en);letter-spacing:0.12em;text-transform:uppercase;border:1px solid currentColor}
.badge-fulltime{background:var(--ai-pale);color:var(--ai-deep);border-color:var(--ai)}
.badge-parttime{background:var(--taisha-pale);color:var(--taisha-deep);border-color:var(--taisha)}

/* Filter bar */
.filter-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px;align-items:center}
.filter-btn{padding:6px 14px;border-radius:2px;border:1px solid var(--border);background:var(--white);color:var(--sumi-2);font:600 11px/1 var(--sans-jp);cursor:pointer;transition:all .15s;font-family:inherit;letter-spacing:0.04em}
.filter-btn:hover{border-color:var(--sumi);color:var(--sumi)}
.filter-btn.active{background:var(--sumi);color:var(--kami);border-color:var(--sumi)}

/* Kanban — 採用ファネル */
.kanban{display:flex;gap:12px;overflow-x:auto;padding-bottom:16px;min-height:calc(100vh - 200px)}
.kanban-col{min-width:240px;max-width:280px;flex:1;display:flex;flex-direction:column}
.kanban-col-header{padding:11px 14px;border-radius:0;display:flex;align-items:center;justify-content:space-between;font:700 11px/1 var(--sans-jp);color:#fff;letter-spacing:0.06em}
.kanban-col-body{flex:1;background:var(--kami-2);border:1px solid var(--border);border-top:none;padding:10px;display:flex;flex-direction:column;gap:8px;min-height:100px}
.kanban-card{background:var(--white);border:1px solid var(--border);border-radius:2px;padding:14px;cursor:pointer;transition:all .15s}
.kanban-card:hover{border-color:var(--sumi);transform:translateY(-1px)}
.kanban-card .card-name{font:700 13px/1.4 var(--serif-jp);color:var(--sumi);margin-bottom:6px}
.kanban-card .card-meta{font:500 11px/1.5 var(--sans-jp);color:var(--sumi-3);display:flex;flex-direction:column;gap:3px}
.kanban-card .card-fee{font:700 italic 12px/1 var(--serif-en);color:var(--shu);margin-top:6px;letter-spacing:-0.01em}
.kanban-card .card-days{font:500 10px/1 var(--mono);color:var(--sumi-4);margin-top:6px;letter-spacing:0.04em}
.kanban-count{background:rgba(255,255,255,.25);border-radius:2px;padding:2px 8px;font:700 11px/1 var(--sans-en);letter-spacing:0.04em}

/* Table */
.data-table{width:100%;border-collapse:collapse;font:500 13px/1.5 var(--sans-jp)}
.data-table th{background:var(--kami-2);padding:11px 12px;text-align:left;font:700 10px/1 var(--sans-en);color:var(--sumi-2);letter-spacing:0.22em;text-transform:uppercase;border-bottom:1.5px solid var(--sumi);white-space:nowrap;cursor:pointer;user-select:none}
.data-table th:hover{background:var(--kami-3)}
.data-table td{padding:11px 12px;border-bottom:1px solid var(--border);vertical-align:middle;color:var(--sumi)}
.data-table tr:hover td{background:var(--kami-2)}
.data-table tr{cursor:pointer}

/* Modal */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(10,10,15,.45);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.show{opacity:1;pointer-events:all}
.modal{background:var(--white);border:1px solid var(--sumi);border-radius:2px;width:90%;max-width:640px;max-height:85vh;overflow-y:auto;box-shadow:0 24px 60px rgba(10,10,15,.18);transform:scale(.97);transition:transform .2s}
.modal-overlay.show .modal{transform:scale(1)}
.modal-header{padding:18px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--white);z-index:1}
.modal-header h3{font:700 17px/1.4 var(--serif-jp);color:var(--sumi)}
.modal-close{background:none;border:none;font:600 20px/1 var(--sans-en);cursor:pointer;color:var(--sumi-3);padding:4px 8px;border-radius:2px}
.modal-close:hover{background:var(--kami-2);color:var(--sumi)}
.modal-body{padding:24px}
.modal-footer{padding:14px 24px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}

/* Form */
.form-group{margin-bottom:16px}
.form-group label{display:block;font:700 10px/1 var(--sans-en);letter-spacing:0.22em;text-transform:uppercase;color:var(--sumi-3);margin-bottom:6px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:2px;font:500 13px/1.4 var(--sans-jp);font-family:inherit;color:var(--sumi);background:var(--white)}
.form-group textarea{min-height:80px;resize:vertical}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--sumi)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}

/* Stats cards — KPI数字を主役に */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-bottom:24px}
.stat-card{background:var(--white);border:1px solid var(--border);border-radius:2px;padding:18px 16px}
.stat-card .stat-label{font:700 10px/1 var(--sans-en);color:var(--sumi-3);letter-spacing:0.22em;text-transform:uppercase;margin-bottom:8px}
.stat-card .stat-value{font:900 italic 28px/1 var(--serif-en);color:var(--sumi);letter-spacing:-0.02em}
.stat-card .stat-sub{font:500 11px/1.4 var(--mono);color:var(--sumi-3);margin-top:6px;letter-spacing:0.04em}

/* Chart */
.chart-container{background:var(--white);border:1px solid var(--border);border-radius:2px;padding:24px;margin-bottom:16px}
.chart-container h4{font:700 10px/1 var(--sans-en);color:var(--sumi-3);letter-spacing:0.24em;text-transform:uppercase;margin-bottom:14px}
.bar-chart{display:flex;flex-direction:column;gap:10px}
.bar-row{display:flex;align-items:center;gap:10px;font:500 12px/1.4 var(--sans-jp)}
.bar-row .bar-label{min-width:140px;text-align:right;color:var(--sumi-2)}
.bar-row .bar-track{flex:1;height:22px;background:var(--kami-3);border-radius:0;overflow:hidden;position:relative}
.bar-row .bar-fill{height:100%;border-radius:0;display:flex;align-items:center;padding:0 8px;color:#fff;font:700 11px/1 var(--sans-en);white-space:nowrap;min-width:fit-content;transition:width .3s;letter-spacing:0.04em}
.bar-row .bar-value{min-width:60px;font:700 italic 13px/1 var(--serif-en);color:var(--sumi);letter-spacing:-0.01em}

/* Templates */
.template-card{background:var(--white);border:1px solid var(--border);border-radius:2px;padding:20px;margin-bottom:14px}
.template-card h4{font:700 14px/1.4 var(--serif-jp);color:var(--sumi);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.template-card textarea{width:100%;min-height:120px;border:1px solid var(--border);border-radius:2px;padding:12px;font:500 12px/1.7 var(--sans-jp);font-family:inherit;resize:vertical;color:var(--sumi);background:var(--white)}

/* Settings */
.settings-section{background:var(--white);border:1px solid var(--border);border-radius:2px;padding:24px;margin-bottom:16px}
.settings-section h4{font:700 14px/1.4 var(--serif-jp);color:var(--sumi);margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.tag{display:inline-flex;align-items:center;gap:6px;padding:5px 11px;background:var(--kami-2);border:1px solid var(--border);border-radius:2px;font:500 12px/1.2 var(--sans-jp);color:var(--sumi-2);margin:2px 4px 2px 0}
.tag .remove{cursor:pointer;color:var(--sumi-3);font-size:14px;font-weight:700}
.tag .remove:hover{color:var(--shu)}

/* Agency posting status */
.posting-status{display:inline-block;padding:3px 9px;border-radius:2px;font:700 10px/1.3 var(--sans-en);letter-spacing:0.14em;text-transform:uppercase;cursor:pointer;user-select:none;border:1px solid currentColor}
.posting-status.active{background:var(--moegi-pale);color:var(--moegi-deep);border-color:var(--moegi)}
.posting-status.inactive{background:var(--kami-2);color:var(--sumi-4);border-color:var(--border)}
.posting-status.inprogress{background:var(--taisha-pale);color:var(--taisha-deep);border-color:var(--taisha)}

/* Responsive */
@media(max-width:768px){
.sidebar{transform:translateX(-100%)}
.sidebar.open{transform:translateX(0)}
.main{margin-left:0}
.topbar{padding:12px 16px}
.content{padding:16px}
.kanban{min-height:auto}
.kanban-col{min-width:220px}
.form-row{grid-template-columns:1fr}
.stats-grid{grid-template-columns:1fr 1fr}
.mobile-toggle{display:block!important}
}
.mobile-toggle{display:none;background:var(--kami);border:1px solid var(--sumi);font:700 16px/1 var(--sans-en);cursor:pointer;padding:8px 10px;border-radius:2px;color:var(--sumi)}

/* Notification */
.toast{position:fixed;bottom:24px;right:24px;background:var(--sumi);color:var(--kami);padding:12px 20px;border-radius:2px;font:600 12px/1.4 var(--sans-jp);letter-spacing:0.02em;z-index:300;transform:translateY(100px);opacity:0;transition:all .3s}
.toast.show{transform:translateY(0);opacity:1}

/* Agency table specifics */
.agency-posting-grid{display:flex;gap:4px;flex-wrap:wrap}
</style>
</head>

<script>
// ============================================================

function getDefaultData(){
  return {
    stages: JSON.parse(JSON.stringify(DEFAULT_STAGES)),
    jobTypes: JSON.parse(JSON.stringify(DEFAULT_JOB_TYPES)),
    agencies: JSON.parse(JSON.stringify(DEFAULT_AGENCIES)),
    candidates: JSON.parse(JSON.stringify(DEFAULT_CANDIDATES)),
    templates: JSON.parse(JSON.stringify(DEFAULT_TEMPLATES)),
    settings: {monthlyBudget:2000000}
  };
}

function loadData(){
  try{
    const d = localStorage.getItem(STORAGE_KEY);
    if(d) return JSON.parse(d);
  }catch(e){}
  return getDefaultData();
}

function saveData(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

let data = loadData();

// ============================================================
// UTILITY
// ============================================================
function genId(){return 'id_'+Date.now()+'_'+Math.random().toString(36).slice(2,7)}

function getAgency(id){return data.agencies.find(a=>a.id===id)}
function getJobType(id){return data.jobTypes.find(j=>j.id===id)}
function getStage(id){return data.stages.find(s=>s.id===id)}

function daysBetween(d1,d2){
  const a=new Date(d1),b=new Date(d2||'2026-04-15');
  return Math.max(0,Math.floor((b-a)/(1000*60*60*24)));
}

function formatYen(n){
  if(!n||n===0)return '\u00a50';
  if(n>=10000)return '\u00a5'+Math.round(n/10000)+'\u4e07';
  return '\u00a5'+n.toLocaleString();
}

function calcFee(candidate){
  const agency=getAgency(candidate.agencyId);
  if(!agency)return 0;
  if(agency.feeType==='fixed'){
    return candidate.employType==='parttime'?agency.feeFixed.parttime:agency.feeFixed.fulltime;
  }
  if(agency.feeType==='percent'){
    const sal=candidate.salary||0;
    if(sal===0)return 0;
    const fee=Math.round(sal*(agency.feePercent/100));
    const minFee=candidate.employType==='parttime'?(agency.feeMin?Math.min(agency.feeMin,400000):0):agency.feeMin;
    return minFee?Math.max(fee,minFee):fee;
  }
  if(agency.feeType==='success'){
    const sal=candidate.salary||0;
    return Math.round(sal*0.2);
  }
  return 0;
}

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

function jobBadge(jtId){
  const jt=getJobType(jtId);
  if(!jt)return '';
  return `<span class="badge ${jt.badgeClass}">${jt.name}</span>`;
}

function employBadge(et){
  if(et==='parttime') return `<span class="badge-employ badge-parttime">\u975E\u5E38\u52E4</span>`;
  return `<span class="badge-employ badge-fulltime">\u5E38\u52E4</span>`;
}

function stageBadge(stId){
  const st=getStage(stId);
  if(!st)return '';
  return `<span class="badge badge-stage" style="background:${st.color}">${st.name}</span>`;
}

// NAVIGATION

let currentPage='pipeline';
let currentFilter='all';
let currentEmployFilter='all';

function showPage(page){
  currentPage=page;
  document.querySelectorAll('.sidebar nav a').forEach(a=>{
    a.classList.toggle('active',a.dataset.page===page);
  });
  const titles={pipeline:'\u30D1\u30A4\u30D7\u30E9\u30A4\u30F3',candidates:'\u5019\u88DC\u8005\u4E00\u89A7',agencies:'\u7D39\u4ECB\u4F1A\u793E\u7BA1\u7406',costs:'\u30B3\u30B9\u30C8\u5206\u6790',templates:'\u30C6\u30F3\u30D7\u30EC\u30FC\u30C8',settings:'\u8A2D\u5B9A'};
  const chs={pipeline:'01',candidates:'02',agencies:'03',costs:'04',templates:'05',settings:'06'};
  const pt=document.getElementById('pageTitle');
  pt.textContent=titles[page]||page;
  pt.setAttribute('data-ch',chs[page]||'00');
  document.getElementById('sidebar').classList.remove('open');
  render();
}

function render(){
  const c=document.getElementById('content');
  const ta=document.getElementById('topbarActions');
  ta.innerHTML='';
  switch(currentPage){
    case 'pipeline':renderPipeline(c,ta);break;
    case 'candidates':renderCandidates(c,ta);break;
    case 'agencies':renderAgencies(c,ta);break;
    case 'costs':renderCosts(c,ta);break;
    case 'templates':renderTemplates(c,ta);break;
    case 'settings':renderSettings(c,ta);break;
  }
}

// ============================================================
// FILTER HELPERS
// ============================================================
function filterCandidates(){
  let list=data.candidates;
  if(currentFilter!=='all') list=list.filter(c=>c.jobType===currentFilter);
  if(currentEmployFilter!=='all') list=list.filter(c=>c.employType===currentEmployFilter);
  return list;
}

function renderFilterBar(){
  let html=`<div class="filter-bar">
    <span style="font-size:12px;color:var(--dim);margin-right:4px">\u8077\u7A2E:</span>
    <button class="filter-btn ${currentFilter==='all'?'active':''}" onclick="currentFilter='all';render()">\u5168\u8077\u7A2E</button>`;
  data.jobTypes.forEach(jt=>{
    html+=`<button class="filter-btn ${currentFilter===jt.id?'active':''}" onclick="currentFilter='${jt.id}';render()">${jt.name}</button>`;
  });
  html+=`<span style="font-size:12px;color:var(--dim);margin-left:12px;margin-right:4px">\u96C7\u7528:</span>
    <button class="filter-btn ${currentEmployFilter==='all'?'active':''}" onclick="currentEmployFilter='all';render()">\u5168\u3066</button>
    <button class="filter-btn ${currentEmployFilter==='fulltime'?'active':''}" onclick="currentEmployFilter='fulltime';render()">\u5E38\u52E4</button>
    <button class="filter-btn ${currentEmployFilter==='parttime'?'active':''}" onclick="currentEmployFilter='parttime';render()">\u975E\u5E38\u52E4</button>
  </div>`;
  return html;
}

// ============================================================
function renderPipeline(container,topbar){
  topbar.innerHTML=`<button class="btn btn-primary" onclick="openAddCandidate()">+ \u5019\u88DC\u8005\u3092\u8FFD\u52A0</button>`;

  const filtered=filterCandidates();

  let html=renderFilterBar();
  html+=`<div class="kanban">`;

  data.stages.forEach(st=>{
    const cards=filtered.filter(c=>c.stage===st.id);
    html+=`<div class="kanban-col">
      <div class="kanban-col-header" style="background:${st.color}">
        <span>${st.name}</span><span class="kanban-count">${cards.length}</span>
      </div>
      <div class="kanban-col-body">`;
    cards.forEach(c=>{
      const agency=getAgency(c.agencyId);
      const days=daysBetween(c.stageDate);
      const fee=calcFee(c);
      html+=`<div class="kanban-card" onclick="openCandidateDetail('${c.id}')">
        <div style="display:flex;align-items:center;gap:4px;flex-wrap:wrap;margin-bottom:4px">
          ${jobBadge(c.jobType)}
          ${employBadge(c.employType)}
          <span class="card-name">${c.name}</span>
        </div>
        <div class="card-meta">
          <span>${agency?agency.name:'\u76F4\u63A5\u5FDC\u52DF'}</span>
          <span>\u7D4C\u9A13${c.expYears}\u5E74</span>
        </div>
        ${fee?`<div class="card-fee">\u7D39\u4ECB\u6599: ${formatYen(fee)}</div>`:''}
        <div class="card-days">${st.id==='hired'?'\u5165\u8077\u6E08\u307F':st.id==='rejected'?'\u898B\u9001\u308A':days+'\u65E5\u7D4C\u904E'}</div>
      </div>`;
    });
    html+=`</div></div>`;
  });
  html+=`</div>`;
  container.innerHTML=html;
}

// 2. CANDIDATES
// ============================================================
let candidateSort={col:'lastAction',asc:false};

function renderCandidates(container,topbar){
  topbar.innerHTML=`<button class="btn btn-primary" onclick="openAddCandidate()">+ \u5019\u88DC\u8005\u3092\u8FFD\u52A0</button>`;

  const filtered=filterCandidates();
  const sorted=[...filtered].sort((a,b)=>{
    let va=a[candidateSort.col],vb=b[candidateSort.col];
    if(typeof va==='number'&&typeof vb==='number')return candidateSort.asc?va-vb:vb-va;
    va=String(va||'');vb=String(vb||'');
    return candidateSort.asc?va.localeCompare(vb):vb.localeCompare(va);
  });

  function sortIcon(col){return candidateSort.col===col?(candidateSort.asc?' \u2191':' \u2193'):'';}

  let html=renderFilterBar();
  html+=`<div style="overflow-x:auto"><table class="data-table">
    <thead><tr>
      <th onclick="toggleCandidateSort('name')">\u6C0F\u540D${sortIcon('name')}</th>
      <th onclick="toggleCandidateSort('jobType')">\u8077\u7A2E${sortIcon('jobType')}</th>
      <th onclick="toggleCandidateSort('employType')">\u96C7\u7528${sortIcon('employType')}</th>
      <th onclick="toggleCandidateSort('expYears')">\u7D4C\u9A13\u5E74\u6570${sortIcon('expYears')}</th>
      <th onclick="toggleCandidateSort('agencyId')">\u7D39\u4ECB\u5143${sortIcon('agencyId')}</th>
      <th onclick="toggleCandidateSort('stage')">\u30B9\u30C6\u30FC\u30BF\u30B9${sortIcon('stage')}</th>
      <th onclick="toggleCandidateSort('firstContact')">\u521D\u56DE\u63A5\u89E6${sortIcon('firstContact')}</th>
      <th onclick="toggleCandidateSort('lastAction')">\u6700\u7D42\u66F4\u65B0${sortIcon('lastAction')}</th>
      <th onclick="toggleCandidateSort('assignee')">\u62C5\u5F53${sortIcon('assignee')}</th>
      <th>\u7D39\u4ECB\u6599</th>
    </tr></thead><tbody>`;

  sorted.forEach(c=>{
    const agency=getAgency(c.agencyId);
    html+=`<tr onclick="openCandidateDetail('${c.id}')">
      <td style="font-weight:600">${c.name}</td>
      <td>${jobBadge(c.jobType)}</td>
      <td>${employBadge(c.employType)}</td>
      <td>${c.expYears}\u5E74</td>
      <td>${agency?agency.name:'\u76F4\u63A5\u5FDC\u52DF'}</td>
      <td>${stageBadge(c.stage)}</td>
      <td>${c.firstContact||'-'}</td>
      <td>${c.lastAction||'-'}</td>
      <td>${c.assignee||'-'}</td>
      <td style="font-weight:500">${formatYen(calcFee(c))}</td>
    </tr>`;
  });
  html+=`</tbody></table></div>`;
  container.innerHTML=html;
}

function toggleCandidateSort(col){
  if(candidateSort.col===col)candidateSort.asc=!candidateSort.asc;
  else{candidateSort.col=col;candidateSort.asc=true;}
  render();
}

function renderAgencies(container,topbar){
  topbar.innerHTML=`<button class="btn btn-primary" onclick="openAddAgency()">+ \u7D39\u4ECB\u4F1A\u793E\u3092\u8FFD\u52A0</button>`;

  const postingLabel={active:'\u63B2\u8F09\u4E2D',inactive:'\u672A\u63B2\u8F09',inprogress:'\u5BFE\u5FDC\u4E2D'};
  const postingClass={active:'active',inactive:'inactive',inprogress:'inprogress'};
  const typeLabel={posting:'\u6C42\u4EBA\u63B2\u8F09\u578B',agent:'\u30A8\u30FC\u30B8\u30A7\u30F3\u30C8\u578B'};

  let html=`<div style="overflow-x:auto"><table class="data-table">
    <thead><tr>
      <th>\u4F1A\u793E\u540D</th><th>\u7A2E\u5225</th>`;
  POSTING_KEYS.forEach(pk=>{
    html+=`<th style="font-size:11px;text-align:center">${pk.label}</th>`;
  });
  html+=`<th>\u624B\u6570\u6599</th><th>\u7D39\u4ECB\u4E2D</th><th>\u6700\u7D42\u9023\u7D61</th><th>\u5099\u8003</th>
    </tr></thead><tbody>`;

  data.agencies.forEach(a=>{
    const activeCount=data.candidates.filter(c=>c.agencyId===a.id&&c.stage!=='rejected'&&c.stage!=='hired').length;
    let feeStr='';
    if(a.feeType==='fixed')feeStr=`\u5E38\u52E4${formatYen(a.feeFixed.fulltime)} / \u975E\u5E38\u52E4${formatYen(a.feeFixed.parttime)}`;
    else if(a.feeType==='percent')feeStr=`\u5E74\u53CE${a.feePercent}%`+(a.feeMin?` (min ${formatYen(a.feeMin)})`:'');
    else if(a.feeType==='success')feeStr='\u6210\u529F\u5831\u916C\u578B';
    else if(a.feeType==='click')feeStr='\u30AF\u30EA\u30C3\u30AF\u8AB2\u91D1';

    html+=`<tr>
      <td><strong>${a.name}</strong><br><span style="font-size:11px;color:var(--dim)">${a.company}</span></td>
      <td><span style="font-size:12px">${typeLabel[a.type]||a.type}</span></td>`;
    POSTING_KEYS.forEach(pk=>{
      const st=a.postings[pk.key]||'inactive';
      html+=`<td style="text-align:center"><span class="posting-status ${postingClass[st]}" onclick="event.stopPropagation();togglePosting('${a.id}','${pk.key}')">${postingLabel[st]}</span></td>`;
    });
    html+=`<td style="font-size:12px">${feeStr}</td>
      <td style="text-align:center;font-weight:600">${activeCount}</td>
      <td>${a.lastContact||'-'}</td>

    </tr>`;
  });
  html+=`</tbody></table></div>`;
  container.innerHTML=html;
}

function togglePosting(agencyId,postingKey){
  const a=data.agencies.find(x=>x.id===agencyId);
  if(!a)return;
  const cycle=['inactive','inprogress','active'];
  const cur=a.postings[postingKey]||'inactive';
  const idx=cycle.indexOf(cur);
  a.postings[postingKey]=cycle[(idx+1)%cycle.length];
  saveData();
  render();
  toast('\u63B2\u8F09\u30B9\u30C6\u30FC\u30BF\u30B9\u3092\u66F4\u65B0\u3057\u307E\u3057\u305F');
}

      const pct=Math.min(100,Math.round(total/maxVal*100));
      html+=`<div class="bar-row">
        <span class="bar-label">${label}</span>
        <div class="bar-track"><div class="bar-fill" style="width:${Math.max(pct,3)}%;background:${jt.color}${et==='parttime'?'99':''}">${cs.length}\u540D</div></div>
        <span class="bar-value">${formatYen(total)}</span>
      </div>`;
    });
  });
  html+=`</div></div>`;

  // Agency comparison
  html+=`<div class="chart-container"><h4>\u7D39\u4ECB\u4F1A\u793E\u5225 \u5019\u88DC\u8005\u6570\u30FB\u30B3\u30B9\u30C8\u6BD4\u8F03</h4><div class="bar-chart">`;
  const maxAgencyCost=Math.max(...data.agencies.map(a=>{
    return data.candidates.filter(c=>c.agencyId===a.id&&c.stage!=='rejected').reduce((s,c)=>s+calcFee(c),0);
  }),1);
  data.agencies.forEach(a=>{
    const cs=data.candidates.filter(c=>c.agencyId===a.id&&c.stage!=='rejected');
    const total=cs.reduce((s,c)=>s+calcFee(c),0);
    const pct=Math.round(total/maxAgencyCost*100);
    html+=`<div class="bar-row">
      <span class="bar-label">${a.name}</span>
      <div class="bar-track"><div class="bar-fill" style="width:${Math.max(pct,3)}%;background:var(--primary)">${cs.length}\u540D</div></div>
      <span class="bar-value">${formatYen(total)}</span>
    </div>`;
  });
  html+=`</div></div>`;

  // Breakdown table by job type and employ type
  html+=`<div class="chart-container"><h4>\u8077\u7A2E\u00D7\u96C7\u7528\u5F62\u614B \u8A73\u7D30\u5185\u8A33</h4>
    <table class="data-table"><thead><tr><th>\u8077\u7A2E</th><th>\u96C7\u7528\u5F62\u614B</th><th>\u5019\u88DC\u8005\u6570</th><th>\u9078\u8003\u4E2D</th><th>\u5185\u5B9A</th><th>\u5165\u8077</th><th>\u898B\u9001\u308A</th><th>\u60F3\u5B9A\u30B3\u30B9\u30C8</th></tr></thead><tbody>`;
  data.jobTypes.forEach(jt=>{
    ['fulltime','parttime'].forEach(et=>{
      const cs=data.candidates.filter(c=>c.jobType===jt.id&&c.employType===et);
      if(cs.length===0)return;
      const screening=cs.filter(c=>['screening','interview1','interview2'].includes(c.stage)).length;
      const offer=cs.filter(c=>c.stage==='offer').length;
      const hired=cs.filter(c=>c.stage==='hired').length;
      const rejected=cs.filter(c=>c.stage==='rejected').length;
      const cost=cs.filter(c=>c.stage==='offer'||c.stage==='hired').reduce((s,c)=>s+calcFee(c),0);
      html+=`<tr style="cursor:default"><td>${jobBadge(jt.id)}</td><td>${employBadge(et)}</td><td>${cs.length}</td><td>${screening}</td><td>${offer}</td><td>${hired}</td><td>${rejected}</td><td style="font-weight:600">${formatYen(cost)}</td></tr>`;
    });
  });
  html+=`</tbody></table></div>`;

  // Agency breakdown table
  html+=`<div class="chart-container"><h4>\u7D39\u4ECB\u4F1A\u793E\u5225 \u8A73\u7D30\u5185\u8A33</h4>
    <table class="data-table"><thead><tr><th>\u7D39\u4ECB\u4F1A\u793E</th><th>\u5019\u88DC\u8005\u6570</th><th>\u9078\u8003\u4E2D</th><th>\u5185\u5B9A</th><th>\u5165\u8077</th><th>\u898B\u9001\u308A</th><th>\u60F3\u5B9A\u30B3\u30B9\u30C8</th></tr></thead><tbody>`;
  data.agencies.forEach(a=>{
    const cs=data.candidates.filter(c=>c.agencyId===a.id);
    if(cs.length===0)return;
    const screening=cs.filter(c=>['screening','interview1','interview2'].includes(c.stage)).length;
    const offer=cs.filter(c=>c.stage==='offer').length;
    const hired=cs.filter(c=>c.stage==='hired').length;
    const rejected=cs.filter(c=>c.stage==='rejected').length;
    const cost=cs.filter(c=>c.stage==='offer'||c.stage==='hired').reduce((s,c)=>s+calcFee(c),0);
    html+=`<tr style="cursor:default"><td>${a.name}</td><td>${cs.length}</td><td>${screening}</td><td>${offer}</td><td>${hired}</td><td>${rejected}</td><td style="font-weight:600">${formatYen(cost)}</td></tr>`;
  });
  html+=`</tbody></table></div>`;

  container.innerHTML=html;
}

function renderTemplates(container,topbar){
  topbar.innerHTML=`<button class="btn btn-primary" onclick="openAddTemplate()">+ \u30C6\u30F3\u30D7\u30EC\u30FC\u30C8\u3092\u8FFD\u52A0</button>`;
  let html='';
  data.templates.forEach(t=>{
    html+=`<div class="template-card">
      <h4>${t.title} <span style="display:flex;gap:4px"><button class="btn btn-sm" onclick="copyTemplate('${t.id}')">\u30B3\u30D4\u30FC</button><button class="btn btn-sm btn-danger" onclick="deleteTemplate('${t.id}')">\u524A\u9664</button></span></h4>
      <textarea id="tpl_${t.id}" oninput="updateTemplate('${t.id}',this.value)">${t.content}</textarea>
    </div>`;
  });
  container.innerHTML=html;
}

function updateTemplate(id,val){
  const t=data.templates.find(x=>x.id===id);
  if(t){t.content=val;saveData();}
}

function copyTemplate(id){
  const t=data.templates.find(x=>x.id===id);
  if(t){navigator.clipboard.writeText(t.content).then(()=>toast('\u30AF\u30EA\u30C3\u30D7\u30DC\u30FC\u30C9\u306B\u30B3\u30D4\u30FC\u3057\u307E\u3057\u305F'));}
}

function deleteTemplate(id){
  if(!confirm('\u3053\u306E\u30C6\u30F3\u30D7\u30EC\u30FC\u30C8\u3092\u524A\u9664\u3057\u307E\u3059\u304B\uFF1F'))return;
  data.templates=data.templates.filter(t=>t.id!==id);
  saveData();render();toast('\u30C6\u30F3\u30D7\u30EC\u30FC\u30C8\u3092\u524A\u9664\u3057\u307E\u3057\u305F');
}

function openAddTemplate(){
  openModal('\u30C6\u30F3\u30D7\u30EC\u30FC\u30C8\u3092\u8FFD\u52A0',`
    <div class="form-group"><label>\u30BF\u30A4\u30C8\u30EB</label><input id="newTplTitle" placeholder="\u30C6\u30F3\u30D7\u30EC\u30FC\u30C8\u540D"></div>
    <div class="form-group"><label>\u5185\u5BB9</label><textarea id="newTplContent" style="min-height:200px" placeholder="\u30C6\u30F3\u30D7\u30EC\u30FC\u30C8\u5185\u5BB9\u3092\u5165\u529B..."></textarea></div>
  `,`<button class="btn" onclick="closeModal()">\u30AD\u30E3\u30F3\u30BB\u30EB</button><button class="btn btn-primary" onclick="saveNewTemplate()">\u8FFD\u52A0</button>`);
}

function saveNewTemplate(){
  const title=document.getElementById('newTplTitle').value.trim();
  const content=document.getElementById('newTplContent').value.trim();
  if(!title){toast('\u30BF\u30A4\u30C8\u30EB\u3092\u5165\u529B\u3057\u3066\u304F\u3060\u3055\u3044');return;}
  data.templates.push({id:genId(),title,content});
  saveData();closeModal();render();toast('\u30C6\u30F3\u30D7\u30EC\u30FC\u30C8\u3092\u8FFD\u52A0\u3057\u307E\u3057\u305F');
}

  </div>

  <div class="settings-section">
    <h4>\u4E88\u7B97\u8A2D\u5B9A</h4>
    <div class="form-group">
      <label>\u6708\u9593\u63A1\u7528\u4E88\u7B97 (\u5186)</label>
      <input type="number" id="monthlyBudget" value="${data.settings.monthlyBudget}" onchange="data.settings.monthlyBudget=Number(this.value);saveData();toast('\u4E88\u7B97\u3092\u66F4\u65B0\u3057\u307E\u3057\u305F')">
    </div>
  </div>

    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn" onclick="exportData()">\u30C7\u30FC\u30BF\u3092\u30A8\u30AF\u30B9\u30DD\u30FC\u30C8 (JSON)</button>
      <button class="btn" onclick="document.getElementById('importFile').click()">\u30C7\u30FC\u30BF\u3092\u30A4\u30F3\u30DD\u30FC\u30C8</button>
      <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
      <button class="btn btn-danger" onclick="resetData()">\u30C7\u30FC\u30BF\u3092\u30EA\u30BB\u30C3\u30C8</button>
    </div>
  </div>`;
  container.innerHTML=html;
}

function addJobType(){
  const name=document.getElementById('newJobType').value.trim();
  const color=document.getElementById('newJobTypeColor').value;
  if(!name){toast('\u8077\u7A2E\u540D\u3092\u5165\u529B\u3057\u3066\u304F\u3060\u3055\u3044');return;}
  data.jobTypes.push({id:genId(),name,fullName:name,color,badgeClass:''});
  saveData();render();toast('\u8077\u7A2E\u3092\u8FFD\u52A0\u3057\u307E\u3057\u305F');
}

function removeJobType(id){
  if(data.candidates.some(c=>c.jobType===id)){toast('\u3053\u306E\u8077\u7A2E\u306E\u5019\u88DC\u8005\u304C\u3044\u308B\u305F\u3081\u524A\u9664\u3067\u304D\u307E\u305B\u3093');return;}
  if(!confirm('\u3053\u306E\u8077\u7A2E\u3092\u524A\u9664\u3057\u307E\u3059\u304B\uFF1F'))return;
  data.jobTypes=data.jobTypes.filter(j=>j.id!==id);
  saveData();render();
}

function exportData(){
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=`hireboard_backup_${new Date().toISOString().slice(0,10)}.json`;
  a.click();URL.revokeObjectURL(url);
  toast('\u30C7\u30FC\u30BF\u3092\u30A8\u30AF\u30B9\u30DD\u30FC\u30C8\u3057\u307E\u3057\u305F');
}

function importData(event){
  const file=event.target.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const imported=JSON.parse(e.target.result);
      if(imported.candidates&&imported.agencies){
        data=imported;saveData();render();
        toast('\u30C7\u30FC\u30BF\u3092\u30A4\u30F3\u30DD\u30FC\u30C8\u3057\u307E\u3057\u305F');
      }else{toast('\u7121\u52B9\u306A\u30C7\u30FC\u30BF\u5F62\u5F0F\u3067\u3059');}
    }catch(err){toast('\u30D5\u30A1\u30A4\u30EB\u306E\u8AAD\u307F\u8FBC\u307F\u306B\u5931\u6557\u3057\u307E\u3057\u305F');}
  };
  reader.readAsText(file);
  event.target.value='';
}

function resetData(){
  if(!confirm('\u5168\u3066\u306E\u30C7\u30FC\u30BF\u3092\u521D\u671F\u72B6\u614B\u306B\u623B\u3057\u307E\u3059\u304B\uFF1F\u3053\u306E\u64CD\u4F5C\u306F\u5143\u306B\u623B\u305B\u307E\u305B\u3093\u3002'))return;
  data=getDefaultData();saveData();render();toast('\u30C7\u30FC\u30BF\u3092\u30EA\u30BB\u30C3\u30C8\u3057\u307E\u3057\u305F');
}

function openModal(title,bodyHtml,footerHtml){
  const m=document.getElementById('modal');
  m.innerHTML=`
    <div class="modal-header"><h3>${title}</h3><button class="modal-close" onclick="closeModal()">&times;</button></div>
    <div class="modal-body">${bodyHtml}</div>
    ${footerHtml?`<div class="modal-footer">${footerHtml}</div>`:''}`;
  document.getElementById('modalOverlay').classList.add('show');
}

function closeModal(){
  document.getElementById('modalOverlay').classList.remove('show');
}

// Candidate Detail Modal
function openCandidateDetail(id){
  const c=data.candidates.find(x=>x.id===id);
  if(!c)return;
  const agency=getAgency(c.agencyId);
  const fee=calcFee(c);
  const days=daysBetween(c.stageDate);

  let agencyOpts=`<option value="">\u76F4\u63A5\u5FDC\u52DF</option>`;
  data.agencies.forEach(a=>{agencyOpts+=`<option value="${a.id}" ${c.agencyId===a.id?'selected':''}>${a.name}</option>`;});
  let stageOpts='';
  data.stages.forEach(s=>{stageOpts+=`<option value="${s.id}" ${c.stage===s.id?'selected':''}>${s.name}</option>`;});
  let jtOpts='';
  data.jobTypes.forEach(j=>{jtOpts+=`<option value="${j.id}" ${c.jobType===j.id?'selected':''}>${j.name}</option>`;});

  const body=`
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:16px">
      ${jobBadge(c.jobType)} ${employBadge(c.employType)} ${stageBadge(c.stage)}
      <span style="font-size:12px;color:var(--dim)">${c.stage==='hired'?'\u5165\u8077\u6E08\u307F':c.stage==='rejected'?'\u898B\u9001\u308A':days+'\u65E5\u7D4C\u904E'}</span>
    </div>
    <div class="form-row">
      <div class="form-group"><label>\u6C0F\u540D</label><input id="cd_name" value="${c.name}"></div>
      <div class="form-group"><label>\u8077\u7A2E</label><select id="cd_jobType">${jtOpts}</select></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>\u7D4C\u9A13\u5E74\u6570</label><input id="cd_exp" type="number" value="${c.expYears}"></div>
      <div class="form-group"><label>\u96C7\u7528\u5F62\u614B</label><select id="cd_employ"><option value="fulltime" ${c.employType==='fulltime'?'selected':''}>\u5E38\u52E4</option><option value="parttime" ${c.employType==='parttime'?'selected':''}>\u975E\u5E38\u52E4</option></select></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>\u7D39\u4ECB\u5143</label><select id="cd_agency">${agencyOpts}</select></div>
      <div class="form-group"><label>\u30B9\u30C6\u30FC\u30B8</label><select id="cd_stage">${stageOpts}</select></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>\u60F3\u5B9A\u5E74\u53CE (\u5186)</label><input id="cd_salary" type="number" value="${c.salary||0}"></div>
      <div class="form-group"><label>\u62C5\u5F53\u8005</label><input id="cd_assignee" value="${c.assignee||''}"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>\u521D\u56DE\u63A5\u89E6\u65E5</label><input id="cd_firstContact" type="date" value="${c.firstContact||''}"></div>
      <div class="form-group"><label>\u6700\u7D42\u66F4\u65B0\u65E5</label><input id="cd_lastAction" type="date" value="${c.lastAction||''}"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>\u96FB\u8A71\u756A\u53F7</label><input id="cd_phone" value="${c.phone||''}"></div>
      <div class="form-group"><label>\u30E1\u30FC\u30EB</label><input id="cd_email" value="${c.email||''}"></div>
    </div>
    <div class="form-group"><label>\u30E1\u30E2</label><textarea id="cd_notes">${c.notes||''}</textarea></div>

    <div style="background:#f8fafc;border:1px solid var(--border);border-radius:8px;padding:12px;margin-top:8px">
      <div style="font-size:12px;font-weight:600;margin-bottom:6px">\u7D39\u4ECB\u6599\u60C5\u5831</div>
      <div style="font-size:13px">\u7D39\u4ECB\u5143: <strong>${agency?agency.name:'\u76F4\u63A5\u5FDC\u52DF'}</strong></div>
      ${agency?`<div style="font-size:13px">\u624B\u6570\u6599\u4F53\u7CFB: ${agency.feeType==='fixed'?'\u56FA\u5B9A\u984D':agency.feeType==='percent'?'\u5E74\u53CE'+agency.feePercent+'%':agency.feeType==='success'?'\u6210\u529F\u5831\u916C\u578B':'\u30AF\u30EA\u30C3\u30AF\u8AB2\u91D1'}</div>`:''}

     <button class="btn btn-primary" onclick="saveCandidateDetail('${c.id}')">\u4FDD\u5B58</button>`);

function saveCandidateDetail(id){
  const c=data.candidates.find(x=>x.id===id);
  if(!c)return;
  const oldStage=c.stage;
  c.name=document.getElementById('cd_name').value.trim();
  c.jobType=document.getElementById('cd_jobType').value;
  c.expYears=Number(document.getElementById('cd_exp').value);
  c.employType=document.getElementById('cd_employ').value;
  c.agencyId=document.getElementById('cd_agency').value;
  c.stage=document.getElementById('cd_stage').value;
  c.salary=Number(document.getElementById('cd_salary').value);
  c.assignee=document.getElementById('cd_assignee').value.trim();
  c.firstContact=document.getElementById('cd_firstContact').value;
  c.lastAction=document.getElementById('cd_lastAction').value;
  c.phone=document.getElementById('cd_phone').value.trim();
  c.email=document.getElementById('cd_email').value.trim();
  c.notes=document.getElementById('cd_notes').value;
  if(c.stage!==oldStage)c.stageDate=new Date().toISOString().slice(0,10);
  saveData();closeModal();render();toast('\u5019\u88DC\u8005\u60C5\u5831\u3092\u66F4\u65B0\u3057\u307E\u3057\u305F');
}

function deleteCandidate(id){
  if(!confirm('\u3053\u306E\u5019\u88DC\u8005\u3092\u524A\u9664\u3057\u307E\u3059\u304B\uFF1F'))return;
  data.candidates=data.candidates.filter(c=>c.id!==id);
  saveData();closeModal();render();toast('\u5019\u88DC\u8005\u3092\u524A\u9664\u3057\u307E\u3057\u305F');
}

      <div class="form-group"><label>\u96C7\u7528\u5F62\u614B</label><select id="nc_employ"><option value="fulltime">\u5E38\u52E4</option><option value="parttime">\u975E\u5E38\u52E4</option></select></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>\u7D39\u4ECB\u5143</label><select id="nc_agency">${agencyOpts}</select></div>
      <div class="form-group"><label>\u30B9\u30C6\u30FC\u30B8</label><select id="nc_stage">${stageOpts}</select></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>\u60F3\u5B9A\u5E74\u53CE (\u5186)</label><input id="nc_salary" type="number" value="0"></div>
      <div class="form-group"><label>\u62C5\u5F53\u8005</label><input id="nc_assignee" placeholder="\u62C5\u5F53\u8005\u540D"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>\u96FB\u8A71\u756A\u53F7</label><input id="nc_phone"></div>
      <div class="form-group"><label>\u30E1\u30FC\u30EB</label><input id="nc_email" type="email"></div>
    </div>
    <div class="form-group"><label>\u30E1\u30E2</label><textarea id="nc_notes"></textarea></div>`;

  openModal('\u5019\u88DC\u8005\u3092\u8FFD\u52A0', body,
    `<button class="btn" onclick="closeModal()">\u30AD\u30E3\u30F3\u30BB\u30EB</button>
     <button class="btn btn-primary" onclick="saveNewCandidate()">\u8FFD\u52A0</button>`);
}

function saveNewCandidate(){
  const name=document.getElementById('nc_name').value.trim();
  if(!name){toast('\u6C0F\u540D\u3092\u5165\u529B\u3057\u3066\u304F\u3060\u3055\u3044');return;}
  const today=new Date().toISOString().slice(0,10);
  data.candidates.push({
    id:genId(),
    name,
    jobType:document.getElementById('nc_jobType').value,
    expYears:Number(document.getElementById('nc_exp').value),
    agencyId:document.getElementById('nc_agency').value,
    stage:document.getElementById('nc_stage').value,
    salary:Number(document.getElementById('nc_salary').value),
    employType:document.getElementById('nc_employ').value,
    firstContact:today,
    lastAction:today,
    stageDate:today,
    assignee:document.getElementById('nc_assignee').value.trim(),
    notes:document.getElementById('nc_notes').value,
    phone:document.getElementById('nc_phone').value.trim(),
    email:document.getElementById('nc_email').value.trim()
  });
  saveData();closeModal();render();toast('\u5019\u88DC\u8005\u3092\u8FFD\u52A0\u3057\u307E\u3057\u305F');
}

// Add Agency Modal
function openAddAgency(){
  const body=`
    <div class="form-row">
      <div class="form-group"><label>\u30B5\u30FC\u30D3\u30B9\u540D *</label><input id="na_name" placeholder="\u30B5\u30FC\u30D3\u30B9\u540D"></div>
      <div class="form-group"><label>\u4F1A\u793E\u540D *</label><input id="na_company" placeholder="\u904B\u55B6\u4F1A\u793E\u540D"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>\u7A2E\u5225</label><select id="na_type"><option value="posting">\u6C42\u4EBA\u63B2\u8F09\u578B</option><option value="agent">\u30A8\u30FC\u30B8\u30A7\u30F3\u30C8\u578B</option></select></div>
      <div class="form-group"><label>\u624B\u6570\u6599\u30BF\u30A4\u30D7</label><select id="na_feeType" onchange="toggleAgencyFeeFields()"><option value="fixed">\u56FA\u5B9A\u984D</option><option value="percent">\u5E74\u53CE\u30D1\u30FC\u30BB\u30F3\u30C8</option><option value="success">\u6210\u529F\u5831\u916C\u578B</option><option value="click">\u30AF\u30EA\u30C3\u30AF\u8AB2\u91D1</option></select></div>
    </div>
    <div id="feeFieldsFixed">
      <div class="form-row">
        <div class="form-group"><label>\u5E38\u52E4\u7D39\u4ECB\u6599 (\u5186)</label><input id="na_feeFull" type="number" value="0"></div>
        <div class="form-group"><label>\u975E\u5E38\u52E4\u7D39\u4ECB\u6599 (\u5186)</label><input id="na_feePart" type="number" value="0"></div>
      </div>
    </div>
    <div id="feeFieldsPercent" style="display:none">
      <div class="form-row">
        <div class="form-group"><label>\u30D1\u30FC\u30BB\u30F3\u30C8 (%)</label><input id="na_feePct" type="number" value="30"></div>
        <div class="form-group"><label>\u6700\u4F4E\u7D39\u4ECB\u6599 (\u5186)</label><input id="na_feeMin" type="number" value="0"></div>
      </div>
    </div>
    <div class="form-group"><label>\u5099\u8003</label><textarea id="na_notes"></textarea></div>`;

  openModal('\u7D39\u4ECB\u4F1A\u793E\u3092\u8FFD\u52A0', body,
    `<button class="btn" onclick="closeModal()">\u30AD\u30E3\u30F3\u30BB\u30EB</button>
     <button class="btn btn-primary" onclick="saveNewAgency()">\u8FFD\u52A0</button>`);
}

function toggleAgencyFeeFields(){
  const ft=document.getElementById('na_feeType').value;
  document.getElementById('feeFieldsFixed').style.display=ft==='fixed'?'':'none';
  document.getElementById('feeFieldsPercent').style.display=ft==='percent'?'':'none';
}

function saveNewAgency(){
  const name=document.getElementById('na_name').value.trim();
  const company=document.getElementById('na_company').value.trim();
  if(!name||!company){toast('\u30B5\u30FC\u30D3\u30B9\u540D\u3068\u4F1A\u793E\u540D\u3092\u5165\u529B\u3057\u3066\u304F\u3060\u3055\u3044');return;}
  const feeType=document.getElementById('na_feeType').value;
  const postings={};
  POSTING_KEYS.forEach(pk=>{postings[pk.key]='inactive';});
  data.agencies.push({
    id:genId(),name,company,
    type:document.getElementById('na_type').value,
    feeType,
    feeFixed:{fulltime:Number(document.getElementById('na_feeFull').value),parttime:Number(document.getElementById('na_feePart').value)},
    feePercent:Number(document.getElementById('na_feePct')?.value||0),
    feeMin:Number(document.getElementById('na_feeMin')?.value||0),
    postings,
    lastContact:new Date().toISOString().slice(0,10),
    notes:document.getElementById('na_notes').value
  });
  saveData();closeModal();render();toast('\u7D39\u4ECB\u4F1A\u793E\u3092\u8FFD\u52A0\u3057\u307E\u3057\u305F');
}

showPage('pipeline');
